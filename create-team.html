<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Créer une équipe | A4P</title><link rel="stylesheet" href="css/style.css"/></head><body><div class="page"><header class="topbar"><div class="brand"><img src="assets/logo-a4p.png" alt="A4P"/><div><h1>Créer une équipe</h1><p>Générer un flux de passation staff prêt à l’emploi</p></div></div><nav class="nav"><a class="secondary" href="index.html">Hub</a><a class="primary" href="dashboard.html">Dashboard</a></nav></header><section class="grid"><article class="card span-7"><h2>Paramètres équipe</h2><div class="form-grid"><div><label>Nom du club</label><input id="club_name" placeholder="Racing 92"/></div><div><label>Nom du coach</label><input id="coach_name" placeholder="Prénom Nom"/></div><div><label>Nom de l’équipe</label><input id="team_name" placeholder="U18"/></div><div><label>Sport</label><input id="sport" placeholder="Rugby"/></div><div><label>Catégorie</label><input id="category" placeholder="U18"/></div><div><label>Nombre de joueurs attendus</label><input id="expected_players" type="number" value="20" min="1"/></div></div><div class="form-actions"><button class="btn" id="create-btn">Créer l’équipe et générer le lien</button><a class="btn secondary" href="teams.html">Voir les équipes</a></div><p class="small">Le lien généré sert à la passation collective CMP. Chaque joueur sera automatiquement rattaché à cette équipe.</p></article><article class="card span-5"><h2>Lien de passation</h2><div id="link-box" class="empty">Crée une équipe pour générer un lien.</div></article></section></div><script src="js/app.js"></script><script>ensureSeed();document.getElementById("create-btn").addEventListener("click",function(){const clubName=document.getElementById("club_name").value.trim(),coachName=document.getElementById("coach_name").value.trim(),teamName=document.getElementById("team_name").value.trim(),sport=document.getElementById("sport").value.trim(),category=document.getElementById("category").value.trim(),expected=parseInt(document.getElementById("expected_players").value||"0",10);if(!clubName||!teamName||!sport||!category||!expected){alert("Merci de renseigner le club, l’équipe, le sport, la catégorie et le nombre de joueurs.");return}const data=readData();let club=data.clubs.find(c=>c.name.toLowerCase()===clubName.toLowerCase());if(!club){club={id:uid("club"),name:clubName,created_at:new Date().toISOString()};data.clubs.push(club)}const team={id:uid("team"),club_id:club.id,name:teamName,sport,category,expected_players:expected,coach_name:coachName,created_at:new Date().toISOString()};data.teams.push(team);saveData(data);const url=makePassationURL(team.id,"cmp");document.getElementById("link-box").innerHTML=`<div class="notice">Équipe créée avec succès.</div><p><strong>${club.name} • ${team.name}</strong></p><div class="codebox">${url}</div><div class="form-actions"><button class="btn" onclick="navigator.clipboard.writeText('${'${url}'.replace(/'/g,"\'")}')">Copier le lien</button><a class="btn secondary" href="equipe.html?team_id=${team.id}">Ouvrir la fiche équipe</a></div>`;setTimeout(()=>{document.getElementById('copy-link-btn').onclick=()=>navigator.clipboard.writeText(url)},0)});</script></body></html>
