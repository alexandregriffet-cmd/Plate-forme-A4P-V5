<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Dashboard staff | A4P</title><link rel="stylesheet" href="css/style.css"/></head><body><div class="page"><header class="topbar"><div class="brand"><img src="assets/logo-a4p.png" alt="A4P"/><div><h1>Dashboard staff</h1><p>Vue consolidée club / équipes / synthèse terrain</p></div></div><nav class="nav"><a class="secondary" href="index.html">Hub</a><a class="primary" href="create-team.html">Créer une équipe</a></nav></header><section class="grid"><article class="card kpi"><div class="label">Équipes suivies</div><div class="value" id="d-teams">0</div></article><article class="card kpi"><div class="label">Joueurs testés</div><div class="value" id="d-players">0</div></article><article class="card kpi"><div class="label">Score moyen</div><div class="value" id="d-score">0</div></article><article class="card kpi"><div class="label">Alertes</div><div class="value" id="d-alerts">0</div></article><article class="card span-6"><h2>Radar collectif global</h2><canvas id="global-radar"></canvas></article><article class="card span-6"><h2>Évolution score moyen</h2><canvas id="global-line"></canvas></article><article class="card span-12"><h2>Synthèse staff automatique</h2><div id="staff-summary" class="notice"></div></article><article class="card span-12"><h2>Équipes</h2><table><thead><tr><th>Club</th><th>Équipe</th><th>Sport</th><th>Réponses</th><th>Score moyen</th><th>Alertes</th><th>Action</th></tr></thead><tbody id="dashboard-body"></tbody></table></article></section></div><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><script src="js/app.js"></script><script>ensureSeed();const data=readData(),results=data.results.filter(r=>r.module==="CMP");document.getElementById("d-teams").textContent=data.teams.length;document.getElementById("d-players").textContent=data.players.length;document.getElementById("d-score").textContent=average(results.map(r=>r.score_global));document.getElementById("d-alerts").textContent=results.filter(r=>formatAlert(r.score_global,r.dimensions).cls!=="ok").length;const globalDims={confiance:average(results.map(r=>r.dimensions.confiance)),regulation:average(results.map(r=>r.dimensions.regulation)),engagement:average(results.map(r=>r.dimensions.engagement)),stabilite:average(results.map(r=>r.dimensions.stabilite))};renderRadar("global-radar",globalDims,"Global");renderLine("global-line",[{label:"T1",value:Math.max(0,average(results.map(r=>r.score_global))-8)},{label:"T2",value:Math.max(0,average(results.map(r=>r.score_global))-4)},{label:"T3",value:average(results.map(r=>r.score_global))}]);const strong=Object.entries(globalDims).sort((a,b)=>b[1]-a[1])[0],weak=Object.entries(globalDims).sort((a,b)=>a[1]-b[1])[0];document.getElementById("staff-summary").innerHTML=`Le collectif présente actuellement un score moyen de <strong>${average(results.map(r=>r.score_global))}/100</strong>. La dimension la plus forte est <strong>${strong?strong[0]:"-"}</strong> (${strong?strong[1]:"-"}/100), tandis que la priorité de travail se situe sur <strong>${weak?weak[0]:"-"}</strong> (${weak?weak[1]:"-"}/100). ${results.filter(r=>formatAlert(r.score_global,r.dimensions).cls!=="ok").length} joueurs apparaissent en vigilance ou alerte.`;document.getElementById("dashboard-body").innerHTML=data.teams.map(t=>{const club=data.clubs.find(c=>c.id===t.club_id),stats=teamStats(t.id);return `<tr><td>${club?club.name:"-"}</td><td>${t.name}</td><td>${t.sport}</td><td>${stats.results.length}/${t.expected_players||0}</td><td>${stats.score||"-"}</td><td>${stats.alerts}</td><td><a class="btn secondary" href="equipe.html?team_id=${t.id}">Ouvrir</a></td></tr>`}).join("");</script></body></html>
