<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Équipes | A4P</title><link rel="stylesheet" href="css/style.css"/></head><body><div class="page"><header class="topbar"><div class="brand"><img src="assets/logo-a4p.png" alt="A4P"/><div><h1>Équipes</h1><p>Vue staff centralisée des équipes créées</p></div></div><nav class="nav"><a class="secondary" href="index.html">Hub</a><a class="primary" href="create-team.html">Créer une équipe</a></nav></header><section class="card" style="margin-top:22px"><h2>Liste des équipes</h2><table><thead><tr><th>Club</th><th>Équipe</th><th>Sport</th><th>Réponses</th><th>Score moyen</th><th>Action</th></tr></thead><tbody id="teams-body"></tbody></table></section></div><script src="js/app.js"></script><script>ensureSeed();const data=readData(),body=document.getElementById("teams-body");body.innerHTML=!data.teams.length?'<tr><td colspan="6">Aucune équipe créée.</td></tr>':data.teams.map(t=>{const club=data.clubs.find(c=>c.id===t.club_id),stats=teamStats(t.id);return `<tr><td>${club?club.name:"-"}</td><td>${t.name}</td><td>${t.sport}</td><td>${stats.results.length}/${t.expected_players||0}</td><td>${stats.score||"-"}</td><td><a class="btn secondary" href="equipe.html?team_id=${t.id}">Ouvrir</a></td></tr>`}).join("");</script></body></html>
