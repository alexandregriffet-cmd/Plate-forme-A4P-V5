<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Fiche équipe | A4P</title><link rel="stylesheet" href="css/style.css"/></head><body><div class="page"><header class="topbar"><div class="brand"><img src="assets/logo-a4p.png" alt="A4P"/><div><h1>Fiche équipe</h1><p>Vue staff détaillée : passation, synthèse et alertes</p></div></div><nav class="nav"><a class="secondary" href="dashboard.html">Dashboard</a><a class="primary" id="team-passation" href="#">Lien de passation</a></nav></header><section class="grid" id="team-root"></section></div><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><script src="js/profiles.js"></script><script src="js/app.js"></script><script>ensureSeed();const teamId=getParam("team_id"),stats=teamStats(teamId),data=readData(),club=stats.team?data.clubs.find(c=>c.id===stats.team.club_id):null,root=document.getElementById("team-root");document.getElementById("team-passation").href=stats.team?makePassationURL(stats.team.id):"create-team.html";if(!stats.team){root.innerHTML='<article class="card span-12"><h2>Équipe introuvable</h2></article>'}else{const playersRows=stats.players.map(p=>{const r=[...stats.results].reverse().find(x=>x.player_id===p.id);if(!r)return `<tr><td>${p.first_name} ${p.last_name}</td><td colspan="7">Pas encore de résultat</td></tr>`;const a=formatAlert(r.score_global,r.dimensions);return `<tr><td>${p.first_name} ${p.last_name}</td><td>${r.score_global}</td><td>${r.dimensions.confiance}</td><td>${r.dimensions.regulation}</td><td>${r.dimensions.engagement}</td><td>${r.dimensions.stabilite}</td><td>${r.profil_nom}</td><td><span class="pill ${a.cls}">${a.emoji}</span></td></tr>`}).join(""),dominantLabel=stats.dominant!=="-"&&window.CMP_PROFILES[stats.dominant]?window.CMP_PROFILES[stats.dominant].nom:"-";root.innerHTML=`<article class="card span-4"><h2>${club?club.name:""}</h2><p><strong>Equipe :</strong> ${stats.team.name}</p><p><strong>Sport :</strong> ${stats.team.sport}</p><p><strong>Catégorie :</strong> ${stats.team.category}</p><p><strong>Coach :</strong> ${stats.team.coach_name||"-"}</p><p><strong>Réponses :</strong> ${stats.results.length}/${stats.team.expected_players||0}</p><div class="codebox">${makePassationURL(stats.team.id)}</div></article><article class="card span-4"><h2>Indicateurs équipe</h2><p><strong>Score moyen :</strong> ${stats.score||"-"}/100</p><p><strong>Alertes :</strong> ${stats.alerts}</p><p><strong>Profil collectif dominant :</strong> ${dominantLabel}</p><p><strong>Confiance :</strong> ${stats.dims.confiance}</p><p><strong>Régulation :</strong> ${stats.dims.regulation}</p><p><strong>Engagement :</strong> ${stats.dims.engagement}</p><p><strong>Stabilité :</strong> ${stats.dims.stabilite}</p></article><article class="card span-4"><h2>Synthèse staff</h2><p class="muted">L’équipe ${stats.team.name} présente un score moyen de ${stats.score||"-"}. La force principale est ${Object.entries(stats.dims).sort((a,b)=>b[1]-a[1])[0]?.[0]||"-"}, tandis que la priorité d’accompagnement se situe sur ${Object.entries(stats.dims).sort((a,b)=>a[1]-b[1])[0]?.[0]||"-"}. ${stats.alerts} joueurs nécessitent un suivi spécifique.</p></article><article class="card span-6"><h2>Radar équipe</h2><canvas id="team-radar"></canvas></article><article class="card span-6"><h2>Suivi de passation</h2><div style="margin:12px 0"><div style="display:flex;justify-content:space-between"><strong>Taux de réponse</strong><span>${stats.team.expected_players?Math.round((stats.results.length/stats.team.expected_players)*100):0}%</span></div><div class="scorebar"><span style="width:${stats.team.expected_players?Math.round((stats.results.length/stats.team.expected_players)*100):0}%"></span></div></div><p class="small">Utilise le lien de passation pour compléter les réponses de l’équipe.</p></article><article class="card span-12"><h2>Tableau joueurs</h2><table><thead><tr><th>Joueur</th><th>Score</th><th>Confiance</th><th>Régulation</th><th>Engagement</th><th>Stabilité</th><th>Profil</th><th>Alerte</th></tr></thead><tbody>${playersRows||'<tr><td colspan="8">Aucune donnée</td></tr>'}</tbody></table></article>`;renderRadar("team-radar",stats.dims,stats.team.name)}</script></body></html>
