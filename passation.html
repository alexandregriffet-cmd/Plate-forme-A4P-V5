<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Passation équipe CMP | A4P</title><link rel="stylesheet" href="css/style.css"/></head><body><div class="page"><header class="topbar"><div class="brand"><img src="assets/logo-a4p.png" alt="A4P"/><div><h1>Passation équipe CMP</h1><p>Questionnaire collectif rattaché automatiquement à l’équipe</p></div></div><nav class="nav"><a class="secondary" href="index.html">Hub</a><a class="secondary" href="teams.html">Équipes</a></nav></header><section class="grid"><article class="card span-4"><h2>Identité joueur</h2><div class="form-grid" style="grid-template-columns:1fr"><div><label>Prénom</label><input id="first_name"/></div><div><label>Nom</label><input id="last_name"/></div><div><label>Poste / rôle</label><input id="role" placeholder="Facultatif"/></div></div><div class="notice" id="team-info" style="margin-top:14px"></div></article><article class="card span-8"><h2>Questionnaire CMP</h2><div id="questions-root" class="list"></div><div class="form-actions"><button class="btn" id="submit-btn">Envoyer ma passation</button><a class="btn secondary" id="team-link" href="#">Ouvrir la fiche équipe</a></div></article></section></div><script src="js/questions.js"></script><script src="js/profiles.js"></script><script src="js/app.js"></script><script>ensureSeed();const teamId=getParam("team_id"),data=readData(),team=data.teams.find(t=>t.id===teamId),club=team?data.clubs.find(c=>c.id===team.club_id):null;document.getElementById("team-info").innerHTML=team?`<strong>${club?club.name:""}</strong><br>${team.name} • ${team.sport} • ${team.category}<br><span class="small">Module : CMP</span>`:"Équipe introuvable.";document.getElementById("team-link").href=team?`equipe.html?team_id=${team.id}`:"teams.html";const root=document.getElementById("questions-root");root.innerHTML=CMP_QUESTIONS.map((q,i)=>`<div class="question"><strong>${i+1}. ${q.text}</strong><div class="options">${[1,2,3,4,5].map(v=>`<div class="option"><label><input type="radio" name="${q.id}" value="${v}"/><span>${v}</span></label></div>`).join("")}</div></div>`).join("");document.getElementById("submit-btn").addEventListener("click",function(){if(!team){alert("Équipe introuvable.");return}const first=document.getElementById("first_name").value.trim(),last=document.getElementById("last_name").value.trim(),role=document.getElementById("role").value.trim();if(!first||!last){alert("Merci de renseigner prénom et nom.");return}const answers={};for(const q of CMP_QUESTIONS){const checked=document.querySelector(`input[name="${q.id}"]:checked`);if(!checked){alert("Merci de répondre à toutes les questions.");return}answers[q.id]=Number(checked.value)}const dims={confiance:average([normalizeLikert(answers.q1),normalizeLikert(answers.q2),normalizeLikert(answers.q3),normalizeLikert(answers.q4)]),regulation:average([normalizeLikert(answers.q5),normalizeLikert(answers.q6),normalizeLikert(answers.q7),normalizeLikert(answers.q8)]),engagement:average([normalizeLikert(answers.q9),normalizeLikert(answers.q10),normalizeLikert(answers.q11),normalizeLikert(answers.q12)]),stabilite:average([normalizeLikert(answers.q13),normalizeLikert(answers.q14),normalizeLikert(answers.q15),normalizeLikert(answers.q16)])},score=average([dims.confiance,dims.regulation,dims.engagement,dims.stabilite]),profile=chooseCMPProfile(dims),data=readData();let player=data.players.find(p=>p.team_id===team.id&&p.first_name.toLowerCase()===first.toLowerCase()&&p.last_name.toLowerCase()===last.toLowerCase());if(!player){player={id:uid("player"),team_id:team.id,first_name:first,last_name:last,role,created_at:new Date().toISOString()};data.players.push(player)}else{player.role=role}data.results.push({id:uid("res"),team_id:team.id,player_id:player.id,module:"CMP",date:new Date().toISOString().slice(0,10),score_global:score,dimensions:dims,profil_code:profile.code,profil_nom:profile.nom,summary:profile.resume});saveData(data);exportLatestCMPToHub();window.location.href=`resultat-passation.html?team_id=${team.id}&player_id=${player.id}`});</script></body></html>
