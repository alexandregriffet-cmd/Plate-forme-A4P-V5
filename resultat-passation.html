<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Résultat passation | A4P</title><link rel="stylesheet" href="css/style.css"/></head><body><div class="page"><header class="topbar"><div class="brand"><img src="assets/logo-a4p.png" alt="A4P"/><div><h1>Résultat CMP</h1><p>Restitution individuelle liée à l’équipe</p></div></div><nav class="nav"><a class="secondary" href="index.html">Hub</a><a class="primary" id="back-team" href="#">Fiche équipe</a></nav></header><section class="grid" id="result-root"></section></div><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><script src="js/app.js"></script><script>ensureSeed();const teamId=getParam("team_id"),playerId=getParam("player_id"),data=readData(),player=data.players.find(p=>p.id===playerId),team=data.teams.find(t=>t.id===teamId),result=[...data.results].reverse().find(r=>r.team_id===teamId&&r.player_id===playerId&&r.module==="CMP");document.getElementById("back-team").href=team?`equipe.html?team_id=${team.id}`:"teams.html";const root=document.getElementById("result-root");if(!result||!player){root.innerHTML='<article class="card span-12"><h2>Résultat introuvable</h2></article>'}else{const alert=formatAlert(result.score_global,result.dimensions);root.innerHTML=`<article class="card span-5"><h2>${player.first_name} ${player.last_name}</h2><p><strong>Equipe :</strong> ${team?team.name:"-"}</p><p><strong>Score global :</strong> ${result.score_global}/100</p><p><strong>Profil :</strong> ${result.profil_nom}</p><p><span class="pill ${alert.cls}">${alert.emoji} ${alert.label}</span></p><p class="muted">${result.summary}</p></article><article class="card span-7"><h2>Radar individuel</h2><canvas id="radar-player"></canvas></article><article class="card span-12"><h2>Scores</h2>${Object.entries(result.dimensions).map(([k,v])=>`<div style="margin:12px 0"><div style="display:flex;justify-content:space-between"><strong>${k}</strong><span>${v}/100</span></div><div class="scorebar"><span style="width:${v}%"></span></div></div>`).join("")}</article>`;renderRadar("radar-player",result.dimensions,"Joueur")}</script></body></html>
